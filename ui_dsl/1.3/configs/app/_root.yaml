name: app.root
description: |
  Top-level application definition per docs/01_Core_Concepts.md §1.2 and bundle metadata per docs/11_Bundle_Metadata.md. Widget and action sub-trees are validated by widgets.schema.json (referenced via #/$defs/Widget and #/$defs/Action — left permissive here so this schema is self-contained).
definition:
  {
    "$schema": "https://json-schema.org/draft/2020-12/schema",
    "$id": "https://specs.makemind.com/mcp_ui_dsl/1.3/app.schema.json",
    "title": "MCP UI DSL 1.3 — ApplicationDefinition",
    "type": "object",
    "properties": {
      "type": {
        "const": "application"
      },
      "version": {
        "$ref": "#/$defs/SemverLike"
      },
      "id": {
        "$ref": "#/$defs/BundleId"
      },
      "title": {
        "type": "string"
      },
      "description": {
        "type": "string"
      },
      "icon": {
        "$ref": "#/$defs/AssetRef"
      },
      "splash": {
        "$ref": "#/$defs/SplashConfig"
      },
      "category": {
        "$ref": "#/$defs/Category"
      },
      "publisher": {
        "$ref": "#/$defs/PublisherInfo"
      },
      "timestamps": {
        "$ref": "#/$defs/TimestampInfo"
      },
      "screenshots": {
        "type": "array",
        "items": {
          "$ref": "#/$defs/AssetRef"
        }
      },
      "initialRoute": {
        "type": "string",
        "pattern": "^/"
      },
      "routes": {
        "$ref": "#/$defs/Routes"
      },
      "theme": {
        "$ref": "https://specs.makemind.com/mcp_ui_dsl/1.3/theme.schema.json"
      },
      "navigation": {
        "$ref": "#/$defs/NavigationConfig"
      },
      "state": {
        "$ref": "#/$defs/StateBlock"
      },
      "lifecycle": {
        "$ref": "#/$defs/LifecycleHooks"
      },
      "onInit": {
        "$ref": "#/$defs/ActionOrList"
      },
      "onReady": {
        "$ref": "#/$defs/ActionOrList"
      },
      "onMount": {
        "$ref": "#/$defs/ActionOrList"
      },
      "onPause": {
        "$ref": "#/$defs/ActionOrList"
      },
      "onResume": {
        "$ref": "#/$defs/ActionOrList"
      },
      "onUnmount": {
        "$ref": "#/$defs/ActionOrList"
      },
      "onDestroy": {
        "$ref": "#/$defs/ActionOrList"
      },
      "services": {
        "type": "object",
        "additionalProperties": {
          "$ref": "#/$defs/ServiceDefinition"
        }
      },
      "templates": {
        "type": "object",
        "additionalProperties": {
          "$ref": "#/$defs/TemplateDefinition"
        }
      },
      "templateLibraries": {
        "type": "array",
        "items": {
          "$ref": "#/$defs/TemplateLibraryRef"
        }
      },
      "i18n": {
        "$ref": "#/$defs/I18nConfig"
      },
      "permissions": {
        "$ref": "#/$defs/PermissionDeclaration"
      },
      "dashboard": {
        "$ref": "#/$defs/DashboardConfig"
      },
      "pages": {
        "type": "object",
        "description": "Page definitions keyed by id. Routes referencing `ui://pages/<id>` resolve against this map. Pages MAY also be inlined directly inside `routes` (see RouteValue); this map is the canonical home when pages are persisted alongside the application.",
        "additionalProperties": {
          "$ref": "https://specs.makemind.com/mcp_ui_dsl/1.3/page.schema.json"
        }
      }
    },
    "required": [
      "type",
      "routes"
    ],
    "additionalProperties": false
  }
