type: select
category: input
profile: Core
aliases:
  - dropdown
description: |
  Single-value dropdown selection. Shared rows per §2.6.0.
properties:
  options:
    type: "Option[]"
    required: true
    description: "`{ value, label, icon? }` entries."
    aliases:
      - items
  placeholder:
    type: "string"
    description: "Placeholder shown when nothing is selected."
# examples migrated verbatim from prose JSON fences.
examples:
  - name: prose_example_0
    dsl: |
      {
        "type": "select",
        "binding": "settings.language",
        "options": [
          { "value": "en", "label": "English" },
          { "value": "es", "label": "Español" },
          { "value": "fr", "label": "Français" }
        ]
      }
