type: numberField
category: input
profile: Core
description: |
  Specialized input for numeric values. Shared rows per §2.6.0; `value` is `number`.
properties:
  label:
    type: "string"
    description: "Field label."
  min:
    type: "number"
    description: "Minimum value."
  max:
    type: "number"
    description: "Maximum value."
  step:
    type: "number"
    default: 1
    description: "Increment size."
  decimalPlaces:
    type: "number"
    default: 0
    description: "Decimal precision."
  prefix:
    type: "string"
    description: "Leading display text (e.g., `\"$\"`)."
  suffix:
    type: "string"
    description: "Trailing display text."
  thousandSeparator:
    type: "string"
    description: "Thousands separator for display."
# examples migrated verbatim from prose JSON fences.
