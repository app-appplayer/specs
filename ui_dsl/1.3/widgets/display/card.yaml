type: card
category: display
profile: Core
description: |
  Elevated single-child container.
properties:
  elevation:
    type: ["string", "number"]
    default: 1
    description: |
      Shadow elevation. Accepts either a numeric dp value or an M3
      elevation token shorthand (`level0` … `level5`) which resolves
      through `theme.elevation.<token>.shadow`.
  margin:
    type: "EdgeInsets"
    description: "Outer margin."
  shape:
    type: ["string", "object"]
    description: |
      Shape of the card surface. M3 shape token shorthand (`extraSmall` /
      `small` / `medium` / `large` / `extraLarge` / `full` / `none`)
      resolves through `theme.shape.<token>`. Object form
      `{ type: "rounded", radius: 12 }` is also accepted.
  color:
    type: "Color"
    description: "Card surface color."
    aliases:
      - backgroundColor
  child:
    type: "Widget"
    required: true
    description: "Card content."
# examples migrated verbatim from prose JSON fences.
examples:
  - name: prose_example_0
    dsl: |
      {
        "type": "card",
        "elevation": 2,
        "margin": { "all": 8 },
        "shape": { "type": "rounded", "radius": 12 },
        "child": { "type": "text", "text": "Card content" }
      }
