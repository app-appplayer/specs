type: progressBar
category: display
profile: Core
aliases:
  - linearProgressIndicator
  - loadingIndicator
  - loading-indicator
  - progress-bar
  - progress
description: |
  Progress indicator (linear or circular).
properties:
  value:
    type: "number | binding"
    description: "Progress in `0.0..1.0`; omit for indeterminate."
  indicatorType:
    type: "string"
    default: "\"linear\""
    description: "`linear` or `circular`."
  color:
    type: "string"
    default: "theme primary"
    description: "Foreground color."
  backgroundColor:
    type: "string"
    description: "Track color."
# examples migrated verbatim from prose JSON fences.
examples:
