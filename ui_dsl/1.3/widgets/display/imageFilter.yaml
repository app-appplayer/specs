type: imageFilter
category: display
profile: Core
since: v1.3
description: |
  Wraps a child with a colour / blur filter. Distinct from
  `BoxDecoration.image.colorFilter` (which colours an image
  background) ‚Äî `imageFilter` filters the entire rendered subtree.
  Use for sepia/grayscale book pages, blur-on-hover thumbnails,
  saturation-bumped hero shots.
properties:
  filter:
    type: string
    enum: [sepia, grayscale, blur, saturation, brightness, contrast, invert]
    required: true
    description: |
      Filter kind:
      - `sepia` ‚Äî warm-tone tint mimicking aged photograph.
      - `grayscale` ‚Äî desaturate to luminance.
      - `blur` ‚Äî Gaussian blur (sigma controlled by `intensity`).
      - `saturation` ‚Äî multiply chroma by `intensity` (0 = grayscale, 1 = unchanged, >1 = pop).
      - `brightness` ‚Äî multiply luminance.
      - `contrast` ‚Äî increase / decrease contrast.
      - `invert` ‚Äî colour invert (negative).
  intensity:
    type: number
    default: 1.0
    description: |
      Filter strength. Range and default depend on `filter`:
      - `sepia` / `grayscale` / `invert` ‚Äî `0.0` (off) .. `1.0` (full). Default `1.0`.
      - `blur` ‚Äî sigma in pixels (`0.0` off, typical 4..16).
      - `saturation` / `brightness` / `contrast` ‚Äî multiplier (`1.0` unchanged).
  child:
    type: Widget
    required: true
    description: Filtered subtree.
examples:
  - name: sepia_book_page
    dsl: |
      {
        "type": "imageFilter",
        "filter": "sepia",
        "intensity": 0.7,
        "child": {
          "type": "image",
          "src": "{{chapter.illustration}}",
          "fit": "cover"
        }
      }
  - name: blur_on_inactive
    dsl: |
      {
        "type": "imageFilter",
        "filter": "blur",
        "intensity": "{{active ? 0 : 8}}",
        "child": { "type": "image", "src": "{{cover}}" }
      }
