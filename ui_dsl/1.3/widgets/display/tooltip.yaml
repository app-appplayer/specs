type: tooltip
category: display
profile: Core
description: |
  Wrapper that reveals a tooltip on hover or long-press.
properties:
  message:
    type: "string"
    required: true
    description: "Tooltip text."
  child:
    type: "Widget"
    required: true
    description: "Wrapped widget."
